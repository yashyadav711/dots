include hyde.conf

# Minimal Tab bar styling 
tab_bar_edge                bottom
tab_bar_style               powerline
tab_powerline_style         slanted
tab_title_template          {tab.active_wd.rsplit('/', 1)[-1] or '/'}{' [{}]'.format(num_windows) if num_windows > 1 else ''}

# remap to open new kitty tab in the same directory (default is home dir)
# map ctrl+shift+t            new_tab_with_cwd

# Keybindings
# Rename the current tab (overrides the auto folder-name title)
map ctrl+shift+r            set_tab_title
# Disable accidental close binds (Pilot uses Super+Q to close windows instead)
map ctrl+shift+w            no_op
map ctrl+shift+q            no_op

# Uncomment the following 4 lines to minimize kitty latency (higher energy usage)
input_delay 0
repaint_delay 2
sync_to_monitor no


# wayland_enable_ime no
copy_on_select yes

# Font settings
font_size 12
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

# Cursor settings
cursor_shape     block
cursor_blink_interval 0.2

touch_scroll_multiplier 5.0

background_opacity 0.85

# Bell / notifications
enable_audio_bell yes
window_alert_on_bell yes
bell_on_tab yes
