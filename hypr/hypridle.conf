# Configuring hypridle
# See: https://wiki.hypr.land/Hypr-Ecosystem/hypridle/

$LOCK_CMD = hyde-shell lockscreen.sh
$UNLOCK_CMD = sh -c 'sleep 3 && pkill -9 $(hyde-shell lockscreen --get)'

general {
    lock_cmd = $LOCK_CMD
    unlock_cmd = $UNLOCK_CMD
    ignore_dbus_inhibit = false
    ignore_systemd_inhibit = false
}

# // --- Listener: Dim display after 9 mins idle (Always) ---
listener {
    timeout = 540
    on-timeout = brightnessctl -s && brightnessctl s 1%
    on-resume = brightnessctl -r
}

# // --- Listener: Lock after 30 mins idle (Only on Battery) ---
listener {
    timeout = 1800
    on-timeout = [ $(cat /sys/class/power_supply/AC/online) -eq 0 ] && loginctl lock-session
}

# // --- Listener: DPMS off after 10 mins idle (Always) ---
listener {
    timeout = 600
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

