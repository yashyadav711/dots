# earlyoom config — tuned by BT (rev 2, 2026-06-03)
# Lesson from the 03:39 freeze: earlyoom killed tiny desktop-session procs
# (dbus-broker, polkit, xdg-portals — all oom_score_adj 200) which tore the
# desktop apart ("only wallpaper") while freeing ~no memory. Fix: AVOID the
# session/desktop infrastructure so earlyoom targets the real hog (Firefox).
#  -r 3600  : memory report hourly
#  -n       : desktop notification when it acts
#  --avoid  : never kill session infra + dev stack (names are /proc comm, 15-char max)
#  --prefer : kill Firefox / web content first
EARLYOOM_ARGS="-r 3600 -n --avoid '(^|/)(init|systemd|systemd-.*|sshd|Hyprland|waybar|dbus-broker|dbus-daemon|pipewire|pipewire-pulse|wireplumber|polkitd|polkit-gnome-au|xdg-desktop-por|xdg-document-po|xdg-permission-|at-spi-bus-laun|at-spi2-registr|gvfsd|gvfsd-metadata|hypridle|hyprpaper|swaync|kitty|dockerd|containerd|postgres|beam\.smp|node|claude)$' --prefer '(^|/)(firefox|chrome|chromium|Web Content|Isolated Web Co|thorium)$'"
