# earlyoom config — tuned by BT (rev 3, 2026-06-03)
# Lesson from the 03:39 freeze: earlyoom killed tiny desktop-session procs
# (dbus-broker, polkit, xdg-portals — all oom_score_adj 200) which tore the
# desktop apart ("only wallpaper") while freeing ~no memory. Fix: AVOID the
# session/desktop infrastructure so earlyoom targets the real hog (Firefox).
# REV3 (after the dead-hyprlock lockscreen incident + Pilot runs claude 24/7):
#   - PROTECT hyprlock/lockscreen so a memory spike can't kill the lockscreen
#     (that left the screen stuck on Hyprland's lock-recovery fallback).
#   - Act EARLIER: on a 7.5 GiB box the default 10% trigger fires too late and
#     the machine livelock-freezes first. SIGTERM at 12% free, SIGKILL at 6%.
#  -r 3600     : memory report hourly
#  -n          : desktop notification when it acts
#  -m 12,6     : SIGTERM at <12% free RAM, SIGKILL at <6%
#  -s 12,6     : same thresholds against (zram) swap
#  --avoid     : never kill session infra + dev stack + lockscreen (names = /proc comm, 15-char max)
#  --prefer    : kill Firefox / web content first
EARLYOOM_ARGS="-r 3600 -n -m 12,6 -s 12,6 --avoid '(^|/)(init|systemd|systemd-.*|sshd|Hyprland|hyprlock|lockscreen.sh|waybar|dbus-broker|dbus-daemon|pipewire|pipewire-pulse|wireplumber|polkitd|polkit-gnome-au|xdg-desktop-por|xdg-document-po|xdg-permission-|at-spi-bus-laun|at-spi2-registr|gvfsd|gvfsd-metadata|hypridle|hyprpaper|swaync|kitty|dockerd|containerd|postgres|beam\.smp|node|claude)$' --prefer '(^|/)(firefox|chrome|chromium|Web Content|Isolated Web Co|thorium)$'"
