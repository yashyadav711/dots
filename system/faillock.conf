# /etc/security/faillock.conf — Home-BT managed (tracked copy in dots/system/).
# Apply: sudo install -m644 this file to /etc/security/faillock.conf (see install.sh).
#
# Why we override the defaults: stock Arch locks an account after 3 failed sudo
# attempts (deny=3) for 10 minutes (unlock_time=600). On a personal single-user
# laptop that just means a couple of password typos lock you out of sudo for ages.
# We loosen it: more strikes, shorter auto-unlock. Root stays exempt (even_deny_root
# left off). This file only tunes pam_faillock; it does NOT touch the PAM stack.

# Strikes before lockout (stock 3 -> 10).
deny = 10

# Window the strikes must happen within, seconds (stock 900).
fail_interval = 900

# Auto-unlock after this many seconds (stock 600=10min -> 120=2min).
unlock_time = 120

# Only track local /etc/passwd users (no AD/LDAP here) — avoids double-lockout edge cases.
local_users_only

# (even_deny_root intentionally OFF: root is never locked out, so there's always a way back in.)
