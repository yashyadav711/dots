# Drop-in: never suspend on lid close (Yash runs long processes on the laptop).
# Goes to /etc/systemd/logind.conf.d/10-lid.conf
# WARNING: laptop stays awake with the lid shut — don't toss it lidded in a bag (overheat risk).
[Login]
HandleLidSwitch=ignore
HandleLidSwitchExternalPower=ignore
HandleLidSwitchDocked=ignore
